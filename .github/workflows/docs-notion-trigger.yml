# Este arquivo NÃO fica em nexusdocs-ai.
# Copie-o para: EduargoGrigolo/docs-notion/.github/workflows/notify-nexusdocs.yml
#
# O que ele faz: a cada push em docs-notion, avisa o nexusdocs-ai para fazer sync.
#
# Setup único (fazer uma vez):
#   1. Acesse github.com/settings/tokens → "Personal access tokens (classic)"
#   2. Crie um token com escopo: workflow
#   3. No repositório docs-notion → Settings → Secrets → Actions
#   4. Adicione: NEXUSDOCS_PAT = <token gerado>
#
name: Notificar NexusDocs AI

on:
  push:
    branches: [main, master]

jobs:
  trigger-sync:
    name: Acionar sync no NexusDocs AI
    runs-on: ubuntu-latest

    steps:
      - name: Disparar repository_dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.NEXUSDOCS_PAT }}
          repository: automacoeslab-bit/nexusdocs-ai
          event-type: docs-updated
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "pusher": "${{ github.actor }}"
            }
