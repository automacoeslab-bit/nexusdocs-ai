# .github/workflows/deploy.yml
#
# NexusDocs AI — Sync + Build + Deploy
#
# Triggers:
#   - push em master (mudança no próprio nexusdocs-ai)
#   - repository_dispatch tipo "docs-updated" (push em docs-notion)
#   - workflow_dispatch (execução manual pelo GitHub UI)
#
# Secrets necessários (em automacoeslab-bit/nexusdocs-ai → Settings → Secrets → Actions):
#   - DOCS_NOTION_TOKEN → token do EduargoGrigolo com escopo "repo" (leitura do docs-notion privado)
#
name: Sync Docs + Build + Deploy

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [docs-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  sync-build-deploy:
    name: Sync → Build → Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout nexusdocs-ai
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Checkout docs-notion
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: EduargoGrigolo/docs-notion
          path: docs-notion-src
          token: ${{ secrets.DOCS_NOTION_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Criar .env para o pipeline
        run: |
          echo "DOCS_NOTION_PATH=${{ github.workspace }}/docs-notion-src" > .env
          echo "SITE_BASE=/nexusdocs-ai" >> .env
          echo "ASTRO_BASE_PATH=/nexusdocs-ai" >> .env

      - name: Sincronizar docs
        run: node --env-file=.env scripts/sync-docs.mjs

      - name: Build
        run: npm run build

      - name: Validar build
        run: |
          test -f dist/index.html || (echo "ERRO: index.html não gerado" && exit 1)
          test -d dist/generated  || (echo "ERRO: /generated não encontrado" && exit 1)
          echo "Build OK — $(find dist -name '*.html' | wc -l) páginas geradas"

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d  # v4

      - name: Upload artefato para Pages
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: dist/

      - name: Deploy para GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4

      - name: Deploy para Vercel
        run: npx vercel deploy --prebuilt --prod dist/ --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
