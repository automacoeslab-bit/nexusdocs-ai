# .github/workflows/deploy.yml
#
# NexusDocs AI — CI/CD Pipeline
#
# V1: Build + validação estrutural no push à main
#
# Para ativar deploy, descomente UMA das seções ao final:
#   - GitHub Pages: descomente o job "deploy-pages"
#   - Vercel:       descomente o job "deploy-vercel" + configure os secrets
#
name: CI — Build e Validação

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validar estrutura de documentação
        run: |
          echo "Validando estrutura de documentação gerada..."
          test -d dist                     || (echo "ERRO: dist/ não encontrado"              && exit 1)
          test -f dist/index.html          || (echo "ERRO: index.html não gerado"             && exit 1)
          test -d dist/visao-geral         || (echo "ERRO: /visao-geral não gerado"           && exit 1)
          test -d dist/arquitetura         || (echo "ERRO: /arquitetura não gerado"           && exit 1)
          test -d dist/ai-agents           || (echo "ERRO: /ai-agents não gerado"             && exit 1)
          test -d dist/produto             || (echo "ERRO: /produto não gerado"               && exit 1)
          test -d dist/governanca          || (echo "ERRO: /governanca não gerado"            && exit 1)
          test -d dist/api-reference       || (echo "ERRO: /api-reference não gerado"         && exit 1)
          test -d dist/workflows           || (echo "ERRO: /workflows não gerado"             && exit 1)
          echo "Validação concluída — todas as páginas geradas com sucesso."

      - name: Upload artefato do site
        uses: actions/upload-artifact@v4
        with:
          name: nexusdocs-ai-dist
          path: dist/
          retention-days: 7

  # ============================================================
